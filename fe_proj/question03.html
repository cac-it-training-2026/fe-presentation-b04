<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>情報セキュリティ運用 4択問題③</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">問題3: セキュリティポリシーの策定とは会社のセキュリティの「理想の姿」を完成させ、自社に合ったセキュリティの「○○」を決めることである。</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q3" value="1" /> 1.基準
                </label>
                <label>
                    <input type="radio" name="q3" value="2" /> 2.目標
                </label>
                <label>
                    <input type="radio" name="q3" value="3" /> 3.運命
                </label>
                <label>
                    <input type="radio" name="q3" value="4" /> 4.限界

                </label>
    				<button type="button" onclick="checkAnswer('q3', '1')">回答する</button>

            </form>

            <details class="quiz-answer" id="answer-details">
		    <summary>解答と解説を見る</summary>
		    <div class="answer-content">
		        <p class="correct-answer">
                        <strong>正解：1. 基準</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
					基本方針（理想の姿）だけでは抽象的であり、日々の業務における具体的な行動に落とし込むことができません。<br>
					そのため、その理想（基本方針）を実現するために、組織として「何をしなければならないか」「何をやってはいけないか」という具体的な判断のモノサシである基準を定める必要があります。
		           </p>
                </div>
            </details>
            
            <br>
            
            <div class="menu-container">
		    <ul class="left-container">
		        <li><button type="button" onclick="finishAndHome()">homeへ戻る</button></li>
		    </ul>
		</div>


		  
        </div>
        <script src="script.js"></script>
    </body>
</html>
