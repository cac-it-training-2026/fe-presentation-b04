<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>HTML/CSS 4択問題（例題）</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="quiz-container">
            <h3 class="quiz-question">例題: HTMLの正式名称はどれですか？</h3>

            <form class="quiz-options">
                <label>
                    <input type="radio" name="q0" value="1" /> 1. High Text
                    Markup Language
                </label>
                <label>
                    <input type="radio" name="q0" value="2" /> 2. Hyper Text
                    Markup Language
                </label>
                <label>
                    <input type="radio" name="q0" value="3" /> 3. Hyper Tool
                    Multi Language
                </label>
                <label>
                    <input type="radio" name="q0" value="4" /> 4. Hyper Text
                    Make Language
                </label>
            </form>

            <details class="quiz-answer">
                <summary>解答と解説を見る</summary>
                <div class="answer-content">
                    <p class="correct-answer">
                        <strong>正解：2. Hyper Text Markup Language</strong>
                    </p>
                    <p class="explanation">
                        <strong>解説：</strong><br />
                        HTMLは「Hyper Text Markup
                        Language（ハイパーテキスト・マークアップ・ランゲージ）」の略です。Webページの構造を作成するための言語として使用されます。
                    </p>
                </div>
            </details>
            
            <br>

			        <li>
			            <button type="button" onclick="location.href='index.html'">homeへ戻る</button>
			        </li>
			    </ul>
			</div>
	
        </div>
    </body>
</html>
